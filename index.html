<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TimeFrame Arasa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .shadow-cute { box-shadow: 0 12px 30px -4px rgba(244, 143, 177, 0.25); }
        .shadow-cute-sm { box-shadow: 0 6px 16px -2px rgba(244, 143, 177, 0.15); }
        .shadow-nav { box-shadow: 0 -8px 30px rgba(244, 143, 177, 0.2); }

        /* --- PREMIUM MICRO-ANIMATIONS CUSTOM CSS --- */
        @keyframes fadeInUp { 
            from { opacity: 0; transform: translateY(16px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        @keyframes scalePop { 
            0% { opacity: 0; transform: scale(0.93); } 
            100% { opacity: 1; transform: scale(1); } 
        }
        
        .animate-fade-in-up { animation: fadeInUp 0.45s cubic-bezier(0.215, 0.610, 0.355, 1) forwards; opacity: 0; }
        .animate-scale-pop { animation: scalePop 0.38s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body class="bg-[#fceef4] font-sans antialiased pb-32">
    <div id="toast-container" class="fixed top-5 right-5 z-[120] flex flex-col pointer-events-none"></div>
    <div id="loading-overlay" class="fixed inset-0 bg-[#4e3c4c]/40 hidden items-center justify-center z-[110] backdrop-blur-sm transition-opacity duration-300">
        <div class="animate-scale-pop rounded-3xl bg-white p-5 shadow-cute border border-pink-100 flex flex-col items-center">
            <div class="animate-spin rounded-full h-10 w-10 border-4 border-[#ff94c2] border-t-transparent mb-2"></div>
            <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Memuat...</span>
        </div>
    </div>

    <div class="max-w-md mx-auto pt-8 px-4">
        <h1 class="text-2xl font-black text-[#4e3c4c] tracking-tight mb-6 animate-fade-in-up">Dashboard Kreatif Arasa</h1>
        
        <div class="bg-white rounded-[2rem] w-full relative overflow-hidden mb-8 border border-pink-50 shadow-cute animate-fade-in-up" style="animation-delay: 0.08s;">
            <div class="flex justify-between items-center bg-gradient-to-br from-[#ffb5d7] to-[#cfa3ff] p-6 text-white pb-10 rounded-b-[2rem]">
                <button onclick="prevMonth()" class="w-8 h-8 flex items-center justify-center bg-white/20 rounded-full font-bold hover:bg-white/30 active:scale-90 transition-all shadow-sm">&larr;</button>
                <h2 id="month-year-display" class="font-black text-lg text-center tracking-wide drop-shadow-sm transition-all duration-300"></h2>
                <button onclick="nextMonth()" class="w-8 h-8 flex items-center justify-center bg-white/20 rounded-full font-bold hover:bg-white/30 active:scale-90 transition-all shadow-sm">&rarr;</button>
            </div>
            <div class="p-6 pt-2 -mt-6 bg-white relative rounded-[2rem]">
                <div class="grid grid-cols-7 text-center text-[10px] font-bold text-gray-400 mb-2 mt-4">
                    <div class="text-red-400">Min</div><div>Sen</div><div>Sel</div><div>Rab</div><div>Kam</div><div>Jum</div><div>Sab</div>
                </div>
                <div id="calendar-grid" class="grid grid-cols-7 gap-y-4 gap-x-2 text-center text-xs font-bold pb-2"></div>
            </div>
        </div>

        <h3 class="text-[#4e3c4c] font-black text-md mb-4 uppercase tracking-wider animate-fade-in-up" style="animation-delay: 0.16s;">Jadwal Mendatang</h3>
        <div id="today-schedule-list" class="space-y-4"></div>
    </div>

    <div id="day-modal" class="fixed inset-0 bg-[#4e3c4c]/40 hidden items-end sm:items-center justify-center p-0 sm:p-4 z-[100] backdrop-blur-sm transition-all duration-300">
        <div class="bg-[#fff6fa] rounded-t-[2.5rem] sm:rounded-[2.5rem] p-6 w-full max-w-md shadow-cute max-h-[80vh] flex flex-col relative border-t border-pink-50 animate-scale-pop">
            <div class="flex justify-between items-start mb-5">
                <div>
                    <h3 id="modal-date-title" class="text-sm font-black text-[#4e3c4c] leading-tight"></h3>
                    <p class="text-[9px] text-gray-400 font-bold uppercase tracking-wider mt-1">Daftar Kunjungan Harian</p>
                </div>
                <button onclick="closeDayModal()" class="w-8 h-8 bg-white text-gray-400 rounded-full flex items-center justify-center font-bold shadow-cute-sm border border-pink-50 hover:bg-gray-50 active:scale-90 transition-transform flex-shrink-0">&times;</button>
            </div>
            <div id="modal-schedule-list" class="overflow-y-auto space-y-4 pb-4 px-1"></div>
        </div>
    </div>

    <script src="db.js"></script>
    <script src="ui.js"></script>
    <script>
        let schedules = [];
        let activeDate = new Date();

        async function renderPage() {
            schedules = await fetchReservations();
            renderCalendar();
            renderUpcoming();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const year = activeDate.getFullYear(); 
            const month = activeDate.getMonth();
            
            if(typeof namaBulanFull !== 'undefined') {
                document.getElementById('month-year-display').innerText = `${namaBulanFull[month]} ${year}`;
            }
            
            grid.innerHTML = '';
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const todayStr = new Date().toISOString().split('T')[0];

            for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div class="h-14"></div>`;
            
            for (let i = 1; i <= daysInMonth; i++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const isToday = dateStr === todayStr;
                
                const dailySch = schedules.filter(s => s.date === dateStr);
                const count = dailySch.length;
                
                let baseClass = isToday 
                    ? `w-9 h-9 flex items-center justify-center rounded-2xl text-white bg-[#ff94c2] shadow-cute-sm transform scale-105` 
                    : `w-9 h-9 flex items-center justify-center rounded-2xl bg-gray-50/70 text-gray-500 hover:bg-pink-50 border border-pink-50/40 active:scale-90 transition-all`;
                
                let ind = count > 0 
                    ? `<div class="text-[8px] font-black text-white mt-1 bg-gradient-to-r from-[#ff94c2] to-[#cfa3ff] rounded-full px-1.5 py-0.5 shadow-sm whitespace-nowrap leading-none transition-all">${count} Acara</div>` 
                    : ``;
                
                grid.innerHTML += `
                <div onclick="openDayModal('${dateStr}')" class="flex flex-col items-center h-14 cursor-pointer">
                    <div class="${baseClass}">${i}</div>
                    ${ind}
                </div>`;
            }
        }

        function prevMonth() { activeDate.setMonth(activeDate.getMonth() - 1); renderCalendar(); }
        function nextMonth() { activeDate.setMonth(activeDate.getMonth() + 1); renderCalendar(); }

        function openDayModal(dateStr) {
            const daily = schedules.filter(s => s.date === dateStr).sort((a,b) => a.time.localeCompare(b.time));
            document.getElementById('modal-date-title').innerText = formatTanggalIndo(dateStr);
            
            const list = document.getElementById('modal-schedule-list');
            if(!daily.length) {
                list.innerHTML = `<div class="bg-white rounded-2xl p-4 text-center text-gray-400 text-xs font-bold border border-pink-50 shadow-sm animate-fade-in-up">Jadwal Kosong. Belum ada kegiatan.</div>`;
            } else {
                list.innerHTML = daily.map((sch, index) => {
                    const delay = index * 0.08;
                    return `
                    <div class="rounded-[1.5rem] p-4 shadow-cute-sm ${sch.category === 'Cooking' ? 'bg-[#edfbd8]' : 'bg-[#e0efff]'} border border-white animate-fade-in-up hover:shadow-md transition-all" style="animation-delay: ${delay}s;">
                        <div class="flex justify-between items-start mb-1">
                            <h4 class="font-bold text-base text-[#1e3c66]">${sch.biro}</h4>
                            <span class="bg-white/70 text-[9px] font-black px-2 py-0.5 rounded-md flex-shrink-0 whitespace-nowrap">${sch.time.substring(0,5)} WIB</span>
                        </div>
                        <div class="inline-block text-[8px] font-black px-3 py-1 rounded-full uppercase mt-2 ${sch.category === 'Cooking' ? 'bg-[#c6f18b]/60 text-[#305016]' : 'bg-[#b6d7ff]/60 text-[#1e3c66]'}">${sch.category}</div>
                    </div>`;
                }).join('');
            }
            document.getElementById('day-modal').classList.replace('hidden', 'flex');
        }
        
        function closeDayModal() { document.getElementById('day-modal').classList.replace('flex', 'hidden'); }

        function renderUpcoming() {
            const list = document.getElementById('today-schedule-list');
            const todayStr = new Date().toISOString().split('T')[0];
            let upcoming = schedules.filter(s => s.date >= todayStr).sort((a,b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time)).slice(0, 5);
            
            if(!upcoming.length) {
                list.innerHTML = `<div class="bg-white rounded-2xl p-4 text-center text-gray-400 text-xs font-bold border border-pink-50 animate-fade-in-up" style="animation-delay: 0.2s;">Belum ada agenda terdekat.</div>`;
                return;
            }

            list.innerHTML = upcoming.map((sch, index) => {
                const delay = (index * 0.08) + 0.2; // Mulai mengalir setelah komponen utama beres
                return `
                <div class="rounded-[1.5rem] p-4 shadow-cute-sm ${sch.category === 'Cooking' ? 'bg-[#edfbd8]' : 'bg-[#e0efff]'} border border-white animate-fade-in-up hover:-translate-y-0.5 hover:shadow-cute transition-all" style="animation-delay: ${delay}s;">
                    <div class="flex justify-between items-start gap-2 mb-2">
                        <h4 class="font-bold text-base text-[#1e3c66] leading-tight">${sch.biro}</h4>
                        <span class="bg-white/70 text-[9px] font-black px-2 py-1 rounded-md text-right whitespace-nowrap">${formatTanggalIndo(sch.date, sch.time)}</span>
                    </div>
                    <div class="inline-block text-[8px] font-black px-3 py-1 rounded-full uppercase ${sch.category === 'Cooking' ? 'bg-[#c6f18b]/60 text-[#305016]' : 'bg-[#b6d7ff]/60 text-[#1e3c66]'}">${sch.category}</div>
                </div>`;
            }).join('');
        }

        document.addEventListener('DOMContentLoaded', renderPage);
    </script>
</body>
</html>
