<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rangkuman Kunjungan - TimeFrame</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .shadow-cute { box-shadow: 0 12px 30px -4px rgba(244, 143, 177, 0.25); }
        .shadow-cute-sm { box-shadow: 0 6px 16px -2px rgba(244, 143, 177, 0.15); }
        .shadow-nav { box-shadow: 0 -8px 30px rgba(244, 143, 177, 0.2); }
    </style>
</head>
<body class="bg-[#fceef4] font-sans antialiased pb-32">
    <div id="toast-container" class="fixed top-5 right-5 z-[120] flex flex-col pointer-events-none"></div>
    <div id="loading-overlay" class="fixed inset-0 bg-[#4e3c4c]/40 hidden items-center justify-center z-[110] backdrop-blur-sm">
        <div class="animate-spin rounded-full h-10 w-10 border-4 border-[#ff94c2] border-t-transparent"></div>
    </div>

    <div class="max-w-md mx-auto pt-8 px-4">
        <div class="flex gap-2 mb-6">
            <button onclick="setTab('Cooking')" id="btn-cooking" class="flex-1 py-3 rounded-2xl text-xs font-black bg-[#ff94c2] text-white shadow-cute">Data Cooking</button>
            <button onclick="setTab('Belanja')" id="btn-belanja" class="flex-1 py-3 rounded-2xl text-xs font-black bg-white text-gray-500">Data Belanja</button>
        </div>

        <div id="list-container" class="space-y-4"></div>
    </div>

    <script src="db.js"></script>
    <script src="ui.js"></script>
    <script>
        let schedules = [];
        let currentTab = 'Cooking';

        async function renderPage() {
            schedules = await fetchReservations();
            setTab(currentTab);
        }

        function setTab(tabName) {
            currentTab = tabName;
            document.getElementById('btn-cooking').className = `flex-1 py-3 rounded-2xl text-xs font-black transition-all ${tabName==='Cooking' ? 'bg-[#ff94c2] text-white shadow-cute' : 'bg-white text-gray-500 shadow-sm'}`;
            document.getElementById('btn-belanja').className = `flex-1 py-3 rounded-2xl text-xs font-black transition-all ${tabName==='Belanja' ? 'bg-[#ff94c2] text-white shadow-cute' : 'bg-white text-gray-500 shadow-sm'}`;
            renderList();
        }

        function renderList() {
            const list = document.getElementById('list-container');
            const data = schedules.filter(s => s.category === currentTab).sort((a,b)=>b.date.localeCompare(a.date));
            
            if(!data.length) {
                list.innerHTML = `<div class="bg-white rounded-3xl p-6 text-center text-gray-400 text-xs font-bold border border-pink-50">Belum ada data ${currentTab}.</div>`;
                return;
            }

            list.innerHTML = data.map(sch => {
                const isLocked = sch.is_dikirim;
                
                let cardStyle = 'bg-white border-pink-50'; 
                if (isLocked) {
                    cardStyle = 'bg-[#e3f9cc] border-[#c2ec9b]'; 
                } else if (sch.status === 'Selesai kelas') {
                    cardStyle = 'bg-[#fff0b8] border-[#f3da80]'; 
                } else if (sch.status === 'Batal') {
                    cardStyle = 'bg-[#ffe0e6] border-[#f9bcca]'; 
                }

                const baseOpts = ['Belum datang', 'Selesai kelas', 'Batal'];
                let optsHtml = baseOpts.map(opt => `<option value="${opt}" ${sch.status === opt ? 'selected':''}>${opt}</option>`).join('');
                
                if (!baseOpts.includes(sch.status) && sch.status) {
                    optsHtml += `<option value="${sch.status}" selected disabled>${sch.status} (Ubah ke status baru)</option>`;
                }

                let statusUi = '';
                if (currentTab === 'Cooking') {
                    if (isLocked) {
                        statusUi = `<div class="bg-white/70 border border-green-200 text-xs font-black rounded-xl p-2.5 text-green-600 text-center w-full shadow-sm">✅ SELESAI SEMUA</div>`;
                    } else {
                        statusUi = `<select onchange="handleStatus('${sch.id}', this.value)" class="bg-white/80 border border-gray-200 text-xs font-bold rounded-xl p-2.5 text-gray-700 outline-none w-full shadow-sm focus:ring-2 focus:ring-pink-200">${optsHtml}</select>`;
                    }
                }

                let trackingHtml = '';
                if (sch.status === 'Selesai kelas' && currentTab === 'Cooking') {
                    let fotoHtml = sch.is_dokumentasi ? `
                        <label class="flex items-center gap-2 text-[10px] font-bold text-gray-700">
                            <input type="checkbox" onchange="handleTrack('${sch.id}', 'status_foto', this.checked)" ${sch.status_foto?'checked':''} ${isLocked?'disabled':''} class="rounded text-[#ff65a3] focus:ring-[#ff94c2] border-pink-200"> Foto Dokumentasi Selesai
                        </label>
                    ` : '';

                    let sertifikatHtml = `
                        <label class="flex items-center gap-2 text-[10px] font-bold text-gray-700">
                            <input type="checkbox" onchange="handleTrack('${sch.id}', 'status_sertifikat', this.checked)" ${sch.status_sertifikat?'checked':''} ${isLocked?'disabled':''} class="rounded text-[#ff65a3] focus:ring-[#ff94c2] border-pink-200"> Cetak Sertifikat Selesai
                        </label>
                    `;

                    let canFinalize = sch.is_dokumentasi ? (sch.status_foto && sch.status_sertifikat) : sch.status_sertifikat;
                    
                    let actionBtnHtml = '';
                    if (!isLocked) {
                        if (canFinalize) actionBtnHtml = `<button onclick="handleFinalize('${sch.id}', true)" class="bg-gradient-to-r from-[#ffb5d7] to-[#cfa3ff] text-white text-[9px] font-black px-4 py-1.5 rounded-lg shadow-sm transform hover:scale-105 transition-transform">Kunci Data</button>`;
                        else actionBtnHtml = `<span class="text-[9px] font-black text-gray-400 bg-white/60 px-2 py-1 rounded-md">Lengkapi Checklist</span>`;
                    } else {
                        actionBtnHtml = `<button onclick="handleFinalize('${sch.id}', false)" class="bg-white border border-purple-200 text-purple-500 text-[9px] font-black px-3 py-1.5 rounded-lg shadow-sm">Buka Kunci</button>`;
                    }

                    trackingHtml = `
                    <div class="mt-4 p-3 bg-white/50 rounded-xl border border-gray-100/50 space-y-2">
                        ${fotoHtml}
                        ${sertifikatHtml}
                        <div class="flex justify-between items-center pt-2 border-t border-gray-200/40 mt-2">
                            <span class="text-[9px] font-black uppercase ${isLocked?'text-green-600':'text-orange-500'}">${isLocked?'Terkunci':'Menunggu Finalisasi'}</span>
                            ${actionBtnHtml}
                        </div>
                    </div>`;
                }

                let editBtnHtml = '';
                if (!isLocked) {
                    editBtnHtml = `
                    <button onclick="openEditModal('${sch.id}')" class="absolute top-5 right-14 text-blue-300 hover:text-blue-600 transition-colors bg-white/50 p-1.5 rounded-full shadow-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
                    </button>`;
                }

                // Injeksi Deskripsi ada di bagian div.mb-3 ini
                return `
                <div class="rounded-[2rem] p-5 shadow-cute-sm border relative transition-colors duration-300 ${cardStyle}">
                    ${editBtnHtml}
                    <button onclick="handleDelete('${sch.id}')" class="absolute top-5 right-5 text-red-300 hover:text-red-600 transition-colors bg-white/50 p-1.5 rounded-full shadow-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                    </button>
                    
                    <div class="mb-3 pr-20">
                        <span class="inline-block text-[9px] font-black bg-white/80 text-gray-600 border border-black/5 px-2 py-1 rounded-lg mb-2 flex-wrap leading-tight shadow-sm">${formatTanggalIndo(sch.date, sch.time)}</span>
                        <h4 class="font-black text-base text-gray-800 leading-tight">${sch.biro}</h4>
                        ${sch.nama_sekolah ? `<p class="text-[10px] font-black text-gray-500 uppercase mt-1">🏫 ${sch.nama_sekolah} (${sch.jumlah_peserta} Orang)</p>` : ''}
                        ${sch.description ? `<p class="text-[11px] text-gray-500 mt-2 font-medium leading-relaxed bg-white/40 p-2.5 rounded-xl border border-black/5">${sch.description}</p>` : ''}
                    </div>
                    
                    <div class="flex flex-col gap-2 mt-4 pt-4 border-t border-black/5">
                        <div class="flex items-center gap-2">
                            ${statusUi}
                            ${sch.file_url ? `<a href="${sch.file_url}" target="_blank" class="bg-blue-50 border border-blue-100 text-blue-500 text-[10px] font-black px-4 py-2.5 rounded-xl whitespace-nowrap shadow-sm hover:bg-blue-100 transition-colors">Unduh File</a>` : ''}
                        </div>
                        ${trackingHtml}
                    </div>
                </div>`;
            }).join('');
        }

        window.handleStatus = async function(id, val) { await updateDbStatus(id, val); renderPage(); };
        window.handleTrack = async function(id, field, val) { await updateDbTracking(id, field, val); renderPage(); };
        window.handleFinalize = async function(id, isDikirim) { 
            if(confirm(isDikirim ? "Finalisasi dan Kunci Data ini?" : "Buka kunci data ini?")) {
                await finalizeDbTask(id, isDikirim); renderPage();
            }
        };
        window.handleDelete = async function(id) {
            if(confirm("Yakin ingin menghapus dokumen ini secara permanen?")) {
                await deleteDbTask(id); renderPage();
            }
        };

        document.addEventListener('DOMContentLoaded', renderPage);
    </script>
</body>
</html>
