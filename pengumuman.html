<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Pengumuman - TimeFrame</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .shadow-cute { box-shadow: 0 12px 30px -4px rgba(244, 143, 177, 0.25); }
        .shadow-cute-sm { box-shadow: 0 6px 16px -2px rgba(244, 143, 177, 0.15); }
        .shadow-nav { box-shadow: 0 -8px 30px rgba(244, 143, 177, 0.2); }
    </style>
</head>
<body class="bg-[#fceef4] font-sans antialiased pb-32">
    <div id="toast-container" class="fixed top-5 right-5 z-[120] flex flex-col pointer-events-none"></div>

    <div class="max-w-md mx-auto pt-8 px-4">
        <h1 class="text-2xl font-black text-[#4e3c4c] tracking-tight mb-2">Pusat Informasi</h1>
        <p class="text-xs text-gray-500 font-bold mb-6">Generate format *Broadcast* Whatsapp jadwal rombongan secara otomatis.</p>

        <div class="bg-white p-6 rounded-[2rem] shadow-cute border border-pink-50">
            <label class="block text-[10px] font-black text-gray-400 mb-2 uppercase tracking-wider">Pilih Rentang Waktu</label>
            <select id="filter-waktu" onchange="generateText()" class="w-full bg-pink-50/30 border border-pink-100 rounded-2xl p-3 text-xs font-bold text-gray-600 focus:ring-2 focus:ring-[#ff94c2] outline-none mb-4 shadow-sm">
                <option value="hari_ini">Jadwal Hari Ini</option>
                <option value="minggu_ini">Jadwal Minggu Ini (7 Hari Ke Depan)</option>
                <option value="bulan_ini">Jadwal Bulan Ini</option>
            </select>

            <textarea id="output-text" class="w-full h-72 bg-gray-50 border border-gray-200 rounded-2xl p-4 text-xs font-medium text-gray-700 outline-none resize-none shadow-inner leading-relaxed" readonly></textarea>
            
            <button onclick="copyToClipboard()" class="w-full mt-5 py-4 text-xs font-black text-white bg-gradient-to-r from-[#ffb5d7] to-[#cfa3ff] rounded-xl shadow-cute hover:opacity-90 uppercase tracking-widest transition-all">
                Salin ke Clipboard
            </button>
        </div>
    </div>

    <script src="db.js"></script>
    <script src="ui.js"></script>
    <script>
        let schedules = [];

        async function renderPage() {
            schedules = await fetchReservations();
            generateText();
        }

        function generateText() {
            const filter = document.getElementById('filter-waktu').value;
            const d = new Date();
            const todayStr = d.toISOString().split('T')[0];
            
            let limitDate = new Date();
            if (filter === 'minggu_ini') limitDate.setDate(limitDate.getDate() + 7);
            if (filter === 'bulan_ini') limitDate.setMonth(limitDate.getMonth() + 1);
            const limitStr = limitDate.toISOString().split('T')[0];

            let filtered = schedules.filter(s => {
                if(filter === 'hari_ini') return s.date === todayStr;
                return s.date >= todayStr && s.date <= limitStr;
            }).sort((a,b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time));

            let output = `*🗓️ INFO JADWAL KUNJUNGAN ARASA*\n`;
            
            // Format Tanggal Dinamis
            let teksPeriode = '';
            if (filter === 'hari_ini') teksPeriode = formatTanggalIndo(todayStr);
            else if (filter === 'minggu_ini') teksPeriode = `${formatTanggalIndo(todayStr)} s/d ${formatTanggalIndo(limitStr)}`;
            else if (filter === 'bulan_ini') {
                const namaBulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
                teksPeriode = `Bulan ${namaBulan[d.getMonth()]} ${d.getFullYear()}`;
            }
            output += `Periode: ${teksPeriode}\n\n`;

            const belanja = filtered.filter(s => s.category === 'Belanja');
            const cooking = filtered.filter(s => s.category === 'Cooking');

            output += `*🛒 Kategori Belanja:*\n`;
            if(!belanja.length) output += `- Tidak ada jadwal.\n`;
            belanja.forEach(s => { output += `- ${formatTanggalIndo(s.date, s.time)} | ${s.biro}\n`; });

            output += `\n*🧑‍🍳 Kategori Cooking Class:*\n`;
            if(!cooking.length) output += `- Tidak ada jadwal.\n`;
            cooking.forEach(s => { output += `- ${formatTanggalIndo(s.date, s.time)} | ${s.biro} (${s.jumlah_peserta || 0} Orang)\n`; });

            output += `\n_Generate Otomatis By Arasa System Timeframe_`;
            document.getElementById('output-text').value = output;
        }

        window.copyToClipboard = function() {
            const copyText = document.getElementById("output-text");
            copyText.select();
            copyText.setSelectionRange(0, 99999); 
            navigator.clipboard.writeText(copyText.value).then(() => {
                showToast("Teks berhasil disalin ke clipboard!");
            }).catch(err => {
                showToast("Gagal menyalin teks", "error");
            });
        }

        document.addEventListener('DOMContentLoaded', renderPage);
    </script>
</body>
</html>
